# CubiqPort — cubiqport.com (HTTPS, Let's Encrypt)
# Next.js (3000) + API (4000) proxy

server {
    server_name cubiqport.com www.cubiqport.com;

    access_log /var/log/nginx/cubiqport.access.log;
    error_log  /var/log/nginx/cubiqport.error.log;
    client_max_body_size 10M;

    # ── API health (smoke test: $API_URL/health) ─────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API (WebSocket terminal dahil) ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Next.js static (doğrudan dosyadan) ────────────────────────────────────
    location /_next/static/ {
        alias /var/www/html/apps/web/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js dashboard ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cubiqport.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cubiqport.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS (Certbot)
server {
    if ($host = www.cubiqport.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = cubiqport.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name cubiqport.com www.cubiqport.com;
    return 404;
}
