# CubiqPort — HTTPS (cubiqport.com)
# Tek seferlik: sunucuda sudo /var/www/html/scripts/setup-nginx-once.sh
# SSL sertifikanız farklı dizindeyse bu dosyada ssl_certificate satırlarını düzenleyin.

server {
    listen 443 ssl http2;
    server_name cubiqport.com www.cubiqport.com;

    ssl_certificate     /etc/letsencrypt/live/cubiqport.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cubiqport.com/privkey.pem;

    access_log /var/log/nginx/cubiqport.access.log;
    error_log  /var/log/nginx/cubiqport.error.log;
    client_max_body_size 10M;

    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        alias /var/www/html/apps/web/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
